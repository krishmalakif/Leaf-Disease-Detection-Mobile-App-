services:
  mongodb:
    image: mongo:7.0
    container_name: leafscaner_mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - leafscaner_net

  flask_api:
    build:
      context: ./LeafScaner
      dockerfile: Dockerfile.flask
    container_name: leafscaner_flask
    restart: unless-stopped
    ports:
      - '5001:5001'
    environment:
      MONGO_URI: mongodb://mongodb:27017/leafscaner
      MODEL_PATH: /models/trained_plant_disease_model.h5
      DATASET_PATH: /models/valid
    volumes:
      - ./New_Plant_Diseases_Dataset/trained_plant_disease_model.h5:/models/trained_plant_disease_model.h5:ro
      - ./New_Plant_Diseases_Dataset/valid:/models/valid:ro
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5001/health').status == 200 else 1)"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 25s
    networks:
      - leafscaner_net

  node_backend:
    build:
      context: ./LeafScaner
      dockerfile: Dockerfile.node
    container_name: leafscaner_node
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      MONGODB_URI: mongodb://mongodb:27017/leafscaner
      PORT: 5000
      NODE_ENV: ${NODE_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-}
      FLASK_URL: http://flask_api:5001
      FLASK_TIMEOUT_MS: ${FLASK_TIMEOUT_MS:-15000}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
    depends_on:
      mongodb:
        condition: service_healthy
      flask_api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:5000/leafscaner/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 15s
    networks:
      - leafscaner_net

volumes:
  mongo_data:

networks:
  leafscaner_net:
    driver: bridge
